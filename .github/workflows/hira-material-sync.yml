name: HIRA Material Sync

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Sync mode
        required: false
        default: rolling
        type: choice
        options:
          - rolling
          - backfill
          - range
      start_month:
        description: Optional start month for range mode (YYYY-MM)
        required: false
        type: string
      end_month:
        description: Optional end month for range mode (YYYY-MM)
        required: false
        type: string
      force:
        description: Force refresh of existing files
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "0 21 4,14,24 * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "hira_material_automation/requirements.txt"
          python -m playwright install chromium

      - name: Run HIRA sync
        shell: bash
        env:
          INPUT_MODE: ${{ github.event.inputs.mode }}
          INPUT_START_MONTH: ${{ github.event.inputs.start_month }}
          INPUT_END_MONTH: ${{ github.event.inputs.end_month }}
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          args=("hira_material_automation/download_hira_material.py" "--config" "hira_material_automation/config.json" "--browser" "chromium" "--headless")
          if [ -n "$INPUT_MODE" ]; then
            args+=("--mode" "$INPUT_MODE")
          fi
          if [ -n "$INPUT_START_MONTH" ]; then
            args+=("--start-month" "$INPUT_START_MONTH")
          fi
          if [ -n "$INPUT_END_MONTH" ]; then
            args+=("--end-month" "$INPUT_END_MONTH")
          fi
          if [ "$INPUT_FORCE" = "true" ]; then
            args+=("--force")
          fi
          python "${args[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hira-material-sync
          retention-days: 7
          path: |
            hira_material_automation/raw
            hira_material_automation/output
            hira_material_automation/logs

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "hira_material_automation/raw" \
                  "hira_material_automation/output" \
                  "hira_material_automation/logs"
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh HIRA material outputs"
            git push
          fi
