name: HIRA Backfill 2023-2025

on:
  workflow_dispatch:
    inputs:
      force:
        description: Force refresh of existing files
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: hira-material-sync
  cancel-in-progress: false

jobs:
  backfill_2023_2025:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r "hira_material_automation/requirements.txt"
          python -m playwright install chromium

      - name: Run 2023-2025 backfill
        shell: bash
        env:
          INPUT_FORCE: ${{ github.event.inputs.force }}
        run: |
          args=("hira_material_automation/download_hira_material.py" "--config" "hira_material_automation/config.json" "--browser" "chromium" "--headless" "--mode" "range" "--start-month" "2023-01" "--end-month" "2025-12")
          if [ "$INPUT_FORCE" = "true" ]; then
            args+=("--force")
          fi
          python "${args[@]}"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hira-backfill-2023-2025
          retention-days: 1
          path: |
            hira_material_automation/raw
            hira_material_automation/output
            hira_material_automation/logs

      - name: Commit generated files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "hira_material_automation/raw" \
                  "hira_material_automation/output" \
                  "hira_material_automation/logs"
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh HIRA material outputs"
            git push
          fi
